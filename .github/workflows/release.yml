name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    name: Build signed release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK platform 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            2>&1 | tail -10

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.MARROW_KEYSTORE_B64 }}" | base64 -d > marrow-release.jks
          ls -la marrow-release.jks

      - name: Build signed release APKs
        run: |
          ./gradlew :phone:assembleRelease :wear:assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/marrow-release.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.MARROW_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.MARROW_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.MARROW_KEY_PASSWORD }}"

      - name: Rename APKs to include version
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p release-apks
          cp phone/build/outputs/apk/release/phone-release.apk \
             "release-apks/marrow-phone-${TAG}.apk" 2>/dev/null || true
          cp wear/build/outputs/apk/release/wear-release.apk \
             "release-apks/marrow-wear-${TAG}.apk" 2>/dev/null || true
          # also accept -unsigned suffix if signing wasn't applied
          cp phone/build/outputs/apk/release/phone-release-unsigned.apk \
             "release-apks/marrow-phone-${TAG}.apk" 2>/dev/null || true
          cp wear/build/outputs/apk/release/wear-release-unsigned.apk \
             "release-apks/marrow-wear-${TAG}.apk" 2>/dev/null || true
          ls -lh release-apks/

      - name: Publish release and upload APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # If a release was created manually before the tag push (common in heartbeat flows),
          # upload APKs to the existing release rather than failing to create a duplicate.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading signed APKs to existing release"
            gh release upload "$TAG" \
              release-apks/marrow-phone-*.apk \
              release-apks/marrow-wear-*.apk \
              --clobber
          else
            echo "Creating new release $TAG with signed APKs"
            gh release create "$TAG" \
              --title "Marrow $TAG" \
              --generate-notes \
              release-apks/marrow-phone-*.apk \
              release-apks/marrow-wear-*.apk
          fi
